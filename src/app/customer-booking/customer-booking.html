customer booking html <section class="customer-panel">

  <div class="customer-header">
    <h2>Edit Customer Booking</h2>
  </div>

  <p>{{ errorMessage }}</p>

  <div class="customer-booking-form">

    <form (ngSubmit)="updateBooking()">

      <div>
        <label for="bookingId">Booking ID:</label>
        <input
          type="number"
          id="bookingId"
          name="bookingId"
          [(ngModel)]="booking.id"
          required
        />
      </div>


      <div>
        <label for="customerId">Customer ID:</label>
        <input
          type="number"
          id="customerId"
          name="customerId"
          [(ngModel)]="booking.customerId"
          required
        />
      </div>


      <div>
        <label for="startDateTime">Start Date Time:</label>
        <input
          type="datetime-local"
          id="startDateTime"
          name="startDateTime"
          [(ngModel)]="booking.startDateTime"
          required
        />
      </div>


      <div>
        <label for="endDateTime">End Date Time:</label>
        <input
          type="datetime-local"
          id="endDateTime"
          name="endDateTime"
          [(ngModel)]="booking.endDateTime"
          required
        />
      </div>


      <div>
        <label for="vehicleId">Vehicle ID:</label>
        <input
          type="number"
          id="vehicleId"
          name="vehicleId"
          [(ngModel)]="booking.vehicleId"
          required
        />
      </div>


      <div>
        <label for="status">Status:</label>
        <input
          type="text"
          id="status"
          name="status"
          [(ngModel)]="booking.status"
          required
        />
      </div>


      <button type="submit">
        Save
      </button>

    </form>

  </div>

<hr>

  <!-- Create Booking -->
  <div class="customer-header">
    <h2>Create Customer Booking</h2>
  </div>

  <div class="customer-booking-form">

    <form (ngSubmit)="createBooking()">

      <div>
        <label for="newCustomerId">Customer ID:</label>
        <input
          type="number"
          id="newCustomerId"
          name="newCustomerId"
          [(ngModel)]="newBooking.customerId"
          required
        />
      </div>

      <div>
        <label for="newStartDateTime">Start Date Time:</label>
        <input
          type="datetime-local"
          id="newStartDateTime"
          name="newStartDateTime"
          [(ngModel)]="newBooking.startDateTime"
          required
        />
      </div>

      <div>
        <label for="newEndDateTime">End Date Time:</label>
        <input
          type="datetime-local"
          id="newEndDateTime"
          name="newEndDateTime"
          [(ngModel)]="newBooking.endDateTime"
          required
        />
      </div>

      <div>
        <label for="newVehicleId">Vehicle ID:</label>
        <input
          type="number"
          id="newVehicleId"
          name="newVehicleId"
          [(ngModel)]="newBooking.vehicleId"
          required
        />
      </div>

      <div>
        <label for="newStatus">Status:</label>
        <input
          type="text"
          id="newStatus"
          name="newStatus"
          [(ngModel)]="newBooking.status"
          required
        />
      </div>

      <button type="submit">Create Booking</button>

    </form>

  </div>

</section>
