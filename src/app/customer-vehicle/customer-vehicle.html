<section class="customer-panel">
  <div class="customer-header">
    <h3>Edit Customer Vehicle</h3>
    <p>Edit the customer's vehicle information below.</p>
  </div>

    <p>{{ errorMessage }}</p>
  

    <form (ngSubmit)="updateVehicle()">
      
        <div>
          <label for="vehicleId">Vehicle ID</label>
          <input type="number" id="vehicleId" name="vehicleId" [(ngModel)]="vehicle.id" readonly />
        </div>

        <div>
          <label for="customerId">Customer ID</label>
          <input
            type="number"
            id="customerId"
            name="customerId"
            [(ngModel)]="vehicle.customerId"
            required
          />
        </div>

        <div class="form-group">
          <label for="make">Make</label>
          <input
            type="text"
            id="make"
            name="make"
            [(ngModel)]="vehicle.make"
            placeholder="e.g. Toyota"
            required
          />
        </div>

        <div class="form-group">
          <label for="model">Model</label>
          <input
            type="text"
            id="model"
            name="model"
            [(ngModel)]="vehicle.model"
            placeholder="e.g. Corolla"
            required
          />
        </div>

        <div class="form-group">
          <label for="year">Year</label>
          <input
            type="number"
            id="year"
            name="year"
            [(ngModel)]="vehicle.year"
            placeholder="2024"
            required
          />
        </div>

        <div class="form-group">
          <label for="licensePlate">License Plate</label>
          <input
            type="text"
            id="licensePlate"
            name="licensePlate"
            [(ngModel)]="vehicle.licensePlate"
            placeholder="ABC-123"
            required
          />
        </div>

        <div class="form-group">
          <label for="color">Color</label>
          <input
            type="text"
            id="color"
            name="color"
            [(ngModel)]="vehicle.color"
            placeholder="Black"
            required
          />
        </div>
      

      <div class="form-actions">
        <button type="submit" mat-raised-button color="primary">Save Vehicle</button>
      </div>
    </form>

</section>
