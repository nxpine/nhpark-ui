<section class="login-page">
  <!-- Logo / Brand -->
  <div class="login-brand">
    <img
      src="https://www.pngplay.com/wp-content/uploads/13/Audi-R8-Transparent-File.png"
      alt="NHPark Logo"
      class="logo"
    />
    <h1>NhPark</h1>
  </div>

  <div class="login-container">
    <!-- Left Image Section -->
    <div class="login-image">
      <img
        src="https://assets-global.website-files.com/6272d526f48338fa17b3152c/642b624ba58a66f766ae7204_Blog%20Image%20Post%20(4)-p-1080.png"
      />
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome Back!</h2>
        <p>Login to manage your account</p>
      </div>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <form (ngSubmit)="login()" class="login-form">
        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            [value]="username"
            (input)="username = $event.target.value"
            name="username"
            placeholder="Enter username"
            required
          />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            [value]="email"
            (input)="email = $event.target.value"
            name="email"
            placeholder="Enter email"
            required
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            [value]="password"
            (input)="password = $event.target.value"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>

        <div class="login-actions">
          <button type="submit" [disabled]="loading">
            @if (loading) {
              Logging in...
            } @else {
              Login
            }
          </button>
        </div>

        <div class="register-link">
          <p>
            Don't have an account?
            <a routerLink="/customer">Create Account</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</section>
