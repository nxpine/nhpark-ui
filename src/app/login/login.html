<section class="login-panel">

  <div class="login-header">
    <h2>Login</h2>
  </div>

  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }

  <div class="login-form">

    <form (ngSubmit)="login()">
      <div>
        <label>Username</label>
        <input
          type="text"
          [value]="username"
          (input)="username = $event.target.value"
          name="username"
          required
        />
      </div>
      <div>
        <label>Email</label>
        <input
          type="email"
          [value]="email"
          (input)="email = $event.target.value"
          name="email"
          required
        />
      </div>
      <div>
        <label>Password</label>
        <input
          type="password"
          [value]="password"
          (input)="password = $event.target.value"
          name="password"
          required
        />
      </div>

      <div class="login-actions">
        <button
          type="submit"
          [disabled]="loading">
          Login
        </button>
      </div>

    </form>

  </div>

</section>
